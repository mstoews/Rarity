name: Rarity
options:
  bundleIdPrefix: com.mapleon
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  defaultConfig: Debug
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Rarity:
    type: application
    platform: iOS
    sources:
      - path: Rarity
        excludes: ["**/*.md"]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mapleon.rarity
        INFOPLIST_FILE: Rarity/Info.plist
        CODE_SIGN_ENTITLEMENTS: Rarity/Rarity.entitlements
        DEVELOPMENT_TEAM: EF24PCZNX7
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"

  RarityTests:
    type: bundle.unit-test
    platform: iOS
    sources: RarityTests
    dependencies:
      - target: Rarity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mapleon.rarity.tests

  RarityUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: RarityUITests
    dependencies:
      - target: Rarity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mapleon.rarity.uitests
